name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (backend + frontend)
        run: npm run lint

      - name: Test (backend + frontend)
        run: npm run test

      - name: Build (backend + frontend)
        run: npm run build
